name: Test examples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out examples
        uses: actions/checkout@v5

      - name: Check out Sigvue main
        uses: actions/checkout@v5
        with:
          repository: briday1/sigvue
          path: .sigvue-framework

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install checked-out Sigvue and examples
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./.sigvue-framework
          python -m pip install -e ".[test,release]"

      - name: Generate deterministic test data
        run: |
          python scripts/generate_minimal_sigmf.py --output data
          python scripts/generate_segmented_results.py --output data/acoustic-events-segmented/acoustic-events.json
          python scripts/generate_lfm_collection.py --output data/lfm-sigmf
          python scripts/generate_test_lte.py --output data/lte

      - name: Run example tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          {
            echo '## Pytest output'
            echo '```text'
            tail -200 pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -ne 0 ]; then
            details=$(tail -c 6000 pytest.log | python -c 'import sys; print(sys.stdin.read().replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))')
            echo "::error file=pytest.log,line=1::$details"
          fi
          exit "$status"

      - name: Verify distributions
        run: |
          rm -rf build dist
          python -m build
          python -m twine check dist/*
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import tarfile
          import zipfile

          expected_scripts = {
              path.as_posix()
              for path in Path("scripts").iterdir()
              if path.is_file()
              and (
                  path.name.startswith(("generate_", "download_"))
                  or path.name == "get_all_data.sh"
              )
          }
          sdist = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(sdist) as archive:
              sdist_files = {
                  PurePosixPath(*PurePosixPath(name).parts[1:]).as_posix()
                  for name in archive.getnames()
                  if len(PurePosixPath(name).parts) > 1
              }
          required_sdist = {"browser.toml", *expected_scripts}
          required_sdist.add("scripts/weather_radar_manifest.tsv")
          missing = sorted(required_sdist - sdist_files)
          if missing:
              raise SystemExit(f"sdist is missing: {', '.join(missing)}")

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              wheel_files = set(archive.namelist())
          required_wheel = {
              "sigvue_examples/ecg/workspace.py",
              "sigvue_examples/plugins/__init__.py",
              "sigvue_examples/plugins/nexrad/reader.py",
              "sigvue_examples/plugins/sigmf/recording.py",
              "sigvue_examples/plugins/wfdb/recording.py",
              "sigvue_examples/weather_radar/workspace.py",
          }
          missing = sorted(required_wheel - wheel_files)
          if missing:
              raise SystemExit(f"wheel is missing: {', '.join(missing)}")
          legacy = {
              "sigvue_examples/memory.py",
              "sigvue_examples/radar/domain.py",
              "sigvue_examples/radar/layout.py",
              "sigvue_examples/radar/sigmf_source.py",
              "sigvue_examples/radar/sigmf_workspace.py",
              "sigvue_examples/radar/style.py",
          }
          unexpected = sorted(
              path
              for path in wheel_files
              if path.startswith("sigvue_examples/io/") or path in legacy
          )
          if unexpected:
              raise SystemExit(
                  f"wheel contains legacy modules: {', '.join(unexpected)}"
              )
          PY
