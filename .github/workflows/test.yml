name: Test examples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out examples
        uses: actions/checkout@v5

      - name: Check out Sigvue main
        uses: actions/checkout@v5
        with:
          repository: briday1/sigvue
          path: .sigvue-framework

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install checked-out Sigvue and examples
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install ./.sigvue-framework
          python -m pip install -e .

      - name: Run example tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          {
            echo '## Pytest output'
            echo '```text'
            tail -200 pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
