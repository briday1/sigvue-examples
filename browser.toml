[browser]
title = "Sigvue Examples"
subtitle = "Explore scientific and analytical results"

[[workspaces]]
use = "digital-comms"
path = "."
id = "digital-comms"
name = "Digital Communications"
[workspaces.config]
data_root = "./data/comms"

[[workspaces]]
use = "waterfall"
path = "."
id = "downloaded-waterfall"
name = "Downloaded"
description = "Windowed waterfall review of locally downloaded SigMF recordings."
category = "spectrum monitoring"
tags = ["windowed", "downloaded", "sigmf", "spectrogram", "waterfall"]
[workspaces.config]
data_root = "./data/downloaded"
filename = "*.sigmf-meta"

[[workspaces]]
use = "acoustic-events-segmented"
path = "."
id = "acoustic-events-segmented"
name = "Acoustic Event Review"
[workspaces.config]
data_root = "./data/acoustic-events-segmented"

[[workspaces]]
use = "waterfall"
path = "."
id = "radio-astronomy-rfi"
name = "Radio Astronomy RFI Survey"
description = "Windowed review of Allen Telescope Array site-survey recordings for radio-frequency interference."
category = "radio astronomy"
tags = ["windowed", "radio astronomy", "rfi", "sigmf", "real data", "waterfall"]
[workspaces.config]
data_root = "./data/radio-astronomy"
filename = "*.sigmf-meta"

[[workspaces]]
use = "waterfall"
path = "."
id = "lte-recordings"
name = "LTE Recordings"
description = "Windowed LTE time-frequency analysis over a sliding-median power overview."
category = "spectrum monitoring"
tags = ["windowed", "single-channel", "LTE", "sigmf", "spectrogram", "waterfall"]
[workspaces.config]
data_root = "./data/lte"
filename = "*.sigmf-meta"

[[workspaces]]
use = "lfm-live"
path = "."
id = "lfm-live"
name = "LFM Live View"
[workspaces.config]
data_root = "./data/lfm-live"

[[workspaces]]
use = "waterfall"
path = "."
id = "radar-waterfall"
name = "Radar Data · Generic Waterfall"
description = "Windowed generic waterfall review of every calibration, terminated-noise, and OTA member in each radar SigMF collection."
category = "signal analysis"
tags = ["windowed", "radar", "LFM", "sigmf", "collection", "generic waterfall", "reuse"]
[workspaces.config]
data_root = "./data/lfm-live"
source_type = "collection"
filename = "*.sigmf-collection"
